# Build metadata still lives in setup.py; this file only holds tooling config
# (black + pytest) so it does not interfere with the existing setuptools build.

[tool.black]
line-length = 88
target-version = ["py39", "py310"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
markers = [
    "integration: end-to-end runs of the eefinder CLI (require blast/diamond/bedtools on PATH)",
]
filterwarnings = [
    # pandas 1.5.x internally calls np.find_common_type, deprecated in numpy
    # 1.25; the call lives in pandas, not EEfinder, and is fixed in pandas >= 2.
    # Scope the ignore to this exact message so real warnings still surface.
    "ignore:np.find_common_type is deprecated:DeprecationWarning",
]
