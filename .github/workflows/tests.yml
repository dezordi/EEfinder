name: tests

# Run the binary-free unit tests on every pull request. The integration tests
# (marker "integration") shell out to blast/diamond/bedtools and are excluded
# here via `-m "not integration"`, so this workflow needs no bioinformatics
# tooling -- only the pip runtime deps and pytest.
on:
  pull_request:
    branches: [master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Runtime deps (click/biopython/pandas/numpy) come from pyproject.toml;
          # the "dev" extra adds pytest + black. No bioinformatics binaries are
          # needed for the unit tests.
          pip install ".[dev]"

      - name: Run unit tests
        run: pytest -m "not integration"
