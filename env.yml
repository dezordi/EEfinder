name: EEfinder
# Only the direct dependencies are pinned; conda resolves the transitive
# libraries. (The previous frozen transitive pins -- e.g. openssl 1.1.1q,
# icu 70.1, boost-cpp 1.74 -- conflicted with the newer tool versions, which
# require openssl 3.x.)
#
# Note: blast 2.17.0 is available on linux-64 but not osx-arm64 (Apple Silicon
# tops out at 2.16.0); use a linux/osx-64 machine or pin blast=2.16.0 there.
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.9
  - pip
  - bedtools=2.31.1
  - blast=2.17.0
  - diamond=2.2.3
  # >=18.1 is required: earlier builds crash with "ACELLULAR_ROOT is not a valid
  # V2reportsRankType" on viral downloads, because NCBI added the "acellular
  # root" taxonomy rank above Viruses (taxid 10239) in 2025.
  - ncbi-datasets-cli=18.1.0
  - pip:
    - biopython==1.79
    - numpy==1.23.1
    - pandas==1.4.2
    - python-dateutil==2.8.2
    - pytz==2022.1
    - six==1.16.0
